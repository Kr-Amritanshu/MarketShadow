services:
    - type: web
      name: marketshadow
      runtime: node
      buildCommand: pnpm install --no-frozen-lockfile && BASE_PATH=/ NODE_ENV=production pnpm run build
      startCommand: node server.mjs
      envVars:
        - key: NODE_VERSION
          value: "20"
        - key: NODE_ENV
          value: production
        - key: BASE_PATH
          value: /
        - key: DATABASE_URL
          fromDatabase:
            name: marketshadow-db
            property: connectionString

  databases:
    - name: marketshadow-db
      plan: free
  